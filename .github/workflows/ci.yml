# IntentCam CI
#
# Two parallel jobs on push to main + PRs:
#  - build: assembleDebug + compile eval (no LLM calls, no OCR).
#    Catches ~80% of regressions — compile errors, missing files,
#    broken refactors — in ~3-4 min without needing API secrets.
#  - regression: full 9-suite regression net via
#    ./scripts/run_regression.sh. Only runs when the workflow is
#    dispatched manually (Actions tab → Run workflow) since it
#    needs ANTHROPIC_AUTH_TOKEN and is too slow for every PR.
#
# PP-OCRv4 mobile backend: not auto-installed in CI. The regression
# job expects a sidecar or pre-installed engine at
# /home/oppry/work/pp_ocrv4_mobile_engine, or falls back to Huawei
# Cloud if HUAWEICLOUD_SDK_* secrets are present, or blind.
# See README "Run the eval" section for cascade details.

name: ci

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:
    inputs:
      suites:
        description: "Space-separated suite names (empty = all 9)"
        required: false
        default: ""

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build:
    name: build (debug APK + eval jar)
    runs-on: ubuntu-latest
    timeout-minutes: 20

    steps:
      - uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 17
          cache: gradle

      - name: Grant wrapper execute permission
        run: chmod +x ./gradlew

      - name: Assemble debug APK
        run: ./gradlew :app:assembleDebug --no-daemon --console=plain

      - name: Compile eval jar
        run: ./gradlew :shared:evalJar --no-daemon --console=plain

      - name: Upload debug APK
        uses: actions/upload-artifact@v4
        with:
          name: intentcam-debug-apk
          path: app/build/outputs/apk/debug/app-debug.apk
          if-no-files-found: warn
          retention-days: 7

  regression:
    name: regression (${{ github.event_name == 'workflow_dispatch' && 'manual' || 'skipped' }})
    runs-on: ubuntu-latest
    timeout-minutes: 90
    # Only run when manually dispatched — every-PR regression would
    # burn API quota without adding much signal on top of the
    # compile-time build job above.
    if: github.event_name == 'workflow_dispatch'

    steps:
      - uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 17
          cache: gradle

      - name: Set up Python 3.12 (for PP-OCRv4 cascade)
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install PP-OCRv4 mobile (optional — falls back to blind)
        continue-on-error: true
        run: |
          pip install paddleocr==2.7.3 opencv-python-headless pillow
          python3 -c "from paddleocr import PaddleOCR; print('PP-OCRv4 import OK')"

      - name: Build eval jar
        run: ./gradlew :shared:evalJar --no-daemon --console=plain

      - name: Run regression
        env:
          ANTHROPIC_AUTH_TOKEN: ${{ secrets.ANTHROPIC_AUTH_TOKEN }}
          ANTHROPIC_BASE_URL: ${{ secrets.ANTHROPIC_BASE_URL }}
          ANTHROPIC_MODEL: ${{ secrets.ANTHROPIC_MODEL }}
          HUAWEICLOUD_SDK_AK: ${{ secrets.HUAWEICLOUD_SDK_AK }}
          HUAWEICLOUD_SDK_SK: ${{ secrets.HUAWEICLOUD_SDK_SK }}
          HUAWEICLOUD_SDK_PROJECT_ID: ${{ secrets.HUAWEICLOUD_SDK_PROJECT_ID }}
        run: |
          SUITES="${{ github.event.inputs.suites }}"
          if [ -n "$SUITES" ]; then
            ./scripts/run_regression.sh --no-build $SUITES
          else
            ./scripts/run_regression.sh --no-build
          fi

      - name: Print summary
        if: always()
        run: |
          ls -la profiling/regression/ | head
          if [ -f profiling/regression/summary_*.json ]; then
            cat profiling/regression/summary_*.json | python3 -m json.tool
          fi

      - name: Upload regression artifacts
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: regression-results
          path: profiling/regression/
          retention-days: 30
